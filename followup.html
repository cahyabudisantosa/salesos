<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Follow Up — Sales OS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div id="sidebar-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99"></div>
  <main class="main-content">
    <div id="header-container"></div>
    <div style="padding:12px 24px 0;border-bottom:1px solid var(--border);background:var(--navy-2);position:sticky;top:57px;z-index:40">
      <div class="filter-bar" id="fu-filter">
        <button class="filter-chip active" data-filter="all">Semua</button>
        <button class="filter-chip" data-filter="overdue">⚠️ Overdue</button>
        <button class="filter-chip" data-filter="today">📅 Hari Ini</button>
        <button class="filter-chip" data-filter="upcoming">🔜 Upcoming</button>
        <button class="filter-chip" data-filter="done">✅ Selesai</button>
      </div>
    </div>
    <div class="page-body">
      <div class="flex items-center justify-between mb-4">
        <span class="text-sm text-muted" id="fu-count">Memuat...</span>
      </div>
      <div id="fu-list" style="display:flex;flex-direction:column;gap:10px">
        <div class="skeleton" style="height:90px;border-radius:12px"></div>
        <div class="skeleton" style="height:90px;border-radius:12px"></div>
        <div class="skeleton" style="height:90px;border-radius:12px"></div>
      </div>
    </div>
  </main>
</div>
<div id="bottom-nav-container"></div>

<script src="config.js"></script>
<script src="utils.js"></script>
<script src="auth.js"></script>
<script src="api.js"></script>
<script src="components.js"></script>
<script src="followup.js"></script>
</body>
</html>
