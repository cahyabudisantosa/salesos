<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Pipeline — Sales OS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div id="sidebar-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99"></div>
  <main class="main-content">
    <div id="header-container"></div>
    <div class="page-body" style="padding:16px;overflow-x:hidden">
      <div class="pipeline-board" id="pipeline-board">
        <div style="display:flex;gap:14px">
          ${[1,2,3,4,5,6,7].map(()=>`<div class="pipeline-col"><div class="skeleton" style="height:36px;border-radius:8px;margin-bottom:10px"></div><div class="skeleton" style="height:80px;border-radius:8px;margin-bottom:8px"></div><div class="skeleton" style="height:80px;border-radius:8px"></div></div>`).join('')}
        </div>
      </div>
    </div>
  </main>
</div>
<div id="bottom-nav-container"></div>

<script src="config.js"></script>
<script src="utils.js"></script>
<script src="auth.js"></script>
<script src="api.js"></script>
<script src="components.js"></script>
<script src="pipeline.js"></script>
</body>
</html>
